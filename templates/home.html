<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Enhancer</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Poppins', sans-serif;
            background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:30px;
        }

        .main-card{
            width:100%;
            max-width:900px;
            border:none;
            border-radius:24px;
            overflow:hidden;
            background:rgba(255,255,255,0.08);
            backdrop-filter: blur(14px);
            box-shadow:0 20px 60px rgba(0,0,0,0.35);
        }

        .left-panel{
            background: linear-gradient(160deg,#111827,#1f2937);
            color:white;
            padding:45px 35px;
            height:100%;
        }

        .left-panel h1{
            font-weight:700;
            font-size:2rem;
            margin-bottom:18px;
        }

        .left-panel p{
            color:#cbd5e1;
            line-height:1.8;
        }

        .feature-box{
            margin-top:25px;
            background:rgba(255,255,255,0.06);
            padding:18px;
            border-radius:14px;
            color:#e2e8f0;
        }

        .right-panel{
            background:#ffffff;
            padding:40px 35px;
        }

        .right-panel h3{
            font-weight:700;
            color:#111827;
        }

        .form-label{
            font-weight:600;
            color:#374151;
        }

        .form-control{
            border-radius:14px;
            border:1px solid #d1d5db;
            padding:14px;
        }

        .form-control:focus{
            border-color:#10b981;
            box-shadow:0 0 0 0.2rem rgba(16,185,129,0.15);
        }

        textarea{
            resize:none;
        }

        .btn-custom{
            background:linear-gradient(135deg,#10b981,#059669);
            border:none;
            border-radius:14px;
            padding:14px;
            font-weight:600;
            font-size:16px;
        }

        .btn-custom:hover{
            background:linear-gradient(135deg,#059669,#047857);
        }

        .footer-text{
            font-size:14px;
            color:#6b7280;
        }

        @media(max-width:768px){
            .left-panel{
                text-align:center;
            }
        }
    </style>
</head>
<body>

<div class="card main-card">
    <div class="row g-0">

        <!-- Left Section -->
        <div class="col-md-5">
            <div class="left-panel">
                <h1>Resume Enhancer</h1>

                <p>
                    Transform ordinary resume points into powerful, ATS-ready achievements
                    tailored for your target role.
                </p>

                <div class="feature-box">
                    ⚡ Instant AI Rewrite <br>
                    🎯 JD Keyword Match <br>
                    📈 Better Impact Statements
                </div>
            </div>
        </div>

        <!-- Right Section -->
        <div class="col-md-7">
            <div class="right-panel">

                <h3 class="mb-4">Optimize Your Resume</h3>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Resume Bullet Points</label>
                        <textarea class="form-control" rows="5" name="bullet_points"
                            placeholder="Example: Managed client projects and improved delivery timelines..."></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Job Description</label>
                        <textarea class="form-control" rows="6" name="job_description"
                            placeholder="Paste target job description here..."></textarea>
                    </div>
                    {% if error %}
                    <div class="alert alert-danger border-radius: 14px;" role="alert">
                        {{ error }}
                    </div>
                    {% endif %}
                    <button type="submit" class="btn btn-success btn-custom w-100">
                        Generate Better Bullets 🚀
                    </button>

                    <p class="text-center mt-3 footer-text mb-0">
                        Designed for modern job seekers
                    </p>

                </form>

            </div>
        </div>

    </div>
</div>

</body>
</html>
